schemaVersion: 2.2.0
metadata:
  name: ziax-workspace-base
  version: 1.0.0
  description: "Base developer workspace for Ziax GitOps repos (OKD 4.20 SCOS) — provides tools container, volumes, commands, and postStart events. Projects are defined by child devfiles."
  tags:
    - GitOps
    - OKD
    - ArgoCD
    - Kustomize

# ── COMPONENTS ────────────────────────────────────────────────────────────────
components:

  - name: tools
    attributes:
      pod-overrides:
        metadata:
          annotations:
            io.kubernetes.cri-o.Devices: "/dev/fuse,/dev/net/tun"
        spec:
          hostUsers: false
      container-overrides:
        securityContext:
          procMount: Unmasked
          capabilities:
            add:
              - SETUID
              - SETGID
    container:
      image: quay.io/ziax/dev-tools:latest
      memoryLimit: 32Gi
      memoryRequest: 8Gi
      cpuLimit: "16"
      cpuRequest: "4"
      mountSources: true
      env:
        # ── Nested containers (rootless podman/buildah) ─────────────────────
        - name: BUILDAH_ISOLATION
          value: chroot
        # ── Kubernetes ───────────────────────────────────────────────────────
        - name: KUBECONFIG
          value: /home/user/.kube/config
        - name: KREW_ROOT
          value: /home/user/.krew
        # ── Helm ─────────────────────────────────────────────────────────────
        - name: HELM_CACHE_HOME
          value: /home/user/.cache/helm
        - name: HELM_CONFIG_HOME
          value: /home/user/.config/helm
        - name: HELM_DATA_HOME
          value: /home/user/.local/share/helm
        # ── SDKMAN (JVM toolchain manager, following UDI convention) ─────────
        - name: SDKMAN_DIR
          value: /home/user/.sdkman
        - name: JAVA_HOME
          value: /home/user/.sdkman/candidates/java/current
        - name: MAVEN_HOME
          value: /home/user/.sdkman/candidates/maven/current
        - name: MAVEN_OPTS
          value: "-Xmx2G -Xms256m -XX:MaxMetaspaceSize=512m"
        - name: GRADLE_OPTS
          value: "-Xmx2G -Xms256m"
        # ── nvm (Node.js version manager, following UDI convention) ──────────
        - name: NVM_DIR
          value: /home/user/.nvm
        # ── PATH: SDKMAN candidates first, then krew, then system ─────────────
        - name: PATH
          value: /home/user/.sdkman/candidates/java/current/bin:/home/user/.sdkman/candidates/maven/current/bin:/home/user/.krew/bin:/home/user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      volumeMounts:
        - name: kubeconfig
          path: /home/user/.kube
        - name: krew-plugins
          path: /home/user/.krew
        - name: sdkman
          path: /home/user/.sdkman
        - name: nvm
          path: /home/user/.nvm
        - name: m2
          path: /home/user/.m2
        - name: gradle
          path: /home/user/.gradle
        - name: user-cache
          path: /home/user/.cache
      args: ["tail", "-f", "/dev/null"]

  # ── Persistent volumes ────────────────────────────────────────────────────
  - name: kubeconfig
    volume:
      size: 64Mi
      ephemeral: false

  - name: krew-plugins
    volume:
      size: 512Mi
      ephemeral: false

  - name: sdkman
    volume:
      size: 2Gi
      ephemeral: false

  - name: nvm
    volume:
      size: 1Gi
      ephemeral: false

  - name: m2
    volume:
      size: 3Gi
      ephemeral: false

  - name: gradle
    volume:
      size: 3Gi
      ephemeral: false

  - name: user-cache
    volume:
      size: 1Gi
      ephemeral: false

# ── COMMANDS ──────────────────────────────────────────────────────────────────
commands:

  # ── postStart initialisation ───────────────────────────────────────────────

  - id: init-git-config
    exec:
      label: "Configure git user"
      component: tools
      workingDir: /projects
      commandLine: |
        cat > /var/tmp/audit-stub.c << 'CEOF'
        #include <errno.h>
        int audit_open(void) { errno = EAFNOSUPPORT; return -1; }
        int audit_close(int fd) { return 0; }
        int audit_log_user_message(int fd, int type, const char *message, const char *hostname, const char *addr, const char *tty, int result) { return 0; }
        int audit_log_user_comm_message(int fd, int type, const char *message, const char *comm, const char *hostname, const char *addr, const char *tty, int result) { return 0; }
        int audit_log_acct_message(int fd, int type, const char *pgname, const char *op, const char *name, unsigned int id, const char *host, const char *addr, const char *tty, int result) { return 0; }
        CEOF
        gcc -shared -fPIC -o /var/tmp/libaudit-stub.so /var/tmp/audit-stub.c 2>/dev/null || true
        until [ -f /tmp/sshd.pid ]; do sleep 1; done
        kill "$(cat /tmp/sshd.pid)" 2>/dev/null || true
        sleep 1
        SSHD_LIBDIR=/sshd/ubi9
        LD_PRELOAD=/var/tmp/libaudit-stub.so:$SSHD_LIBDIR/libeconf.so.0:$SSHD_LIBDIR/libpam.so.0:$SSHD_LIBDIR/libcrypt.so.2 \
          $SSHD_LIBDIR/sshd -D -f /var/tmp/ssh/sshd_config -E /tmp/sshd.log &
        [ -L /home/user/.gitconfig ] && [ ! -e /home/user/.gitconfig ] && rm /home/user/.gitconfig || true
        git config --global user.email "${GIT_AUTHOR_EMAIL:-dev@ziax.com}"
        git config --global user.name  "${GIT_AUTHOR_NAME:-Dev Workspace}"
        git config --global core.editor vim
        git config --global pull.rebase true

  - id: init-sdkman
    exec:
      label: "Initialise SDKMAN volume from image backup"
      component: tools
      workingDir: /projects
      commandLine: |
        if [ ! -f "${SDKMAN_DIR}/bin/sdkman-init.sh" ]; then
          echo "Populating SDKMAN volume from image backup..."
          cp -a /opt/sdkman/. "${SDKMAN_DIR}/"
        fi

  - id: init-nvm
    exec:
      label: "Initialise nvm volume from image backup"
      component: tools
      workingDir: /projects
      commandLine: |
        if [ ! -f "${NVM_DIR}/nvm.sh" ]; then
          echo "Populating nvm volume from image backup..."
          cp -a /opt/nvm/. "${NVM_DIR}/"
        fi

  - id: init-krew
    exec:
      label: "Install/update krew plugins"
      component: tools
      workingDir: /projects
      commandLine: |
        export PATH="${KREW_ROOT}/bin:${PATH}"
        if ! kubectl krew version &>/dev/null 2>&1; then
          OS="$(uname | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m | sed -e 's/x86_64/amd64/' -e 's/arm.*$/arm/')"
          KREW_PKG="krew-${OS}_${ARCH}"
          KREW_TMP="$(mktemp -d)"
          curl -fsSL "https://github.com/kubernetes-sigs/krew/releases/latest/download/${KREW_PKG}.tar.gz" \
            | tar -C "${KREW_TMP}" -zx \
            && "${KREW_TMP}/${KREW_PKG}" install krew \
            || echo "krew install failed, will retry on next start"
          rm -rf "${KREW_TMP}"
        fi
        kubectl krew update || true
        kubectl krew install ctx ns neat || true

# ── EVENTS ────────────────────────────────────────────────────────────────────
events:
  postStart:
    - init-git-config
    - init-sdkman
    - init-nvm
    - init-krew
